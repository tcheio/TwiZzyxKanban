<div class="mx-auto max-w-2xl p-6">
  <a routerLink="/board" class="mb-4 inline-flex items-center gap-1 text-sm text-gray-500 hover:text-gray-700">
    ← Retour au tableau
  </a>

  <h1 class="mb-6 text-xl font-semibold text-gray-900">Paramètres du tableau</h1>

  @if (error()) {
    <p class="mb-4 rounded-md bg-red-50 px-3 py-2 text-sm text-red-600">{{ error() }}</p>
  }

  @if (loading()) {
    <p class="text-sm text-gray-500">Chargement...</p>
  } @else {
    <div class="rounded-xl border border-gray-200 bg-white shadow-sm">
      @for (column of columns(); track column.id; let i = $index) {
        <div class="flex items-center gap-2 border-b border-gray-100 px-4 py-3 last:border-b-0">
          <input
            type="text"
            class="min-w-0 flex-1 rounded-md border border-gray-300 px-2.5 py-1.5 text-sm text-gray-900 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
            [value]="column.name"
            [disabled]="saving()"
            (change)="rename(column, $any($event.target).value)"
          />
          <button
            type="button"
            class="rounded-md border border-gray-300 px-2 py-1.5 text-xs text-gray-600 hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-40"
            [disabled]="i === 0 || saving()"
            title="Déplacer à gauche"
            (click)="move(i, -1)"
          >
            ◀
          </button>
          <button
            type="button"
            class="rounded-md border border-gray-300 px-2 py-1.5 text-xs text-gray-600 hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-40"
            [disabled]="i === columns().length - 1 || saving()"
            title="Déplacer à droite"
            (click)="move(i, 1)"
          >
            ▶
          </button>
          <button
            type="button"
            class="rounded-md px-2.5 py-1.5 text-xs font-medium text-red-600 hover:bg-red-50 disabled:cursor-not-allowed disabled:opacity-40"
            [disabled]="saving()"
            title="Supprimer la colonne"
            (click)="remove(column)"
          >
            Supprimer
          </button>
        </div>
      }

      <div class="flex items-center gap-2 px-4 py-3">
        <input
          type="text"
          class="min-w-0 flex-1 rounded-md border border-gray-300 px-2.5 py-1.5 text-sm text-gray-900 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          placeholder="Nom de la nouvelle colonne"
          [value]="newColumnName()"
          (input)="newColumnName.set($any($event.target).value)"
          (keyup.enter)="addColumn()"
        />
        <button
          type="button"
          class="shrink-0 rounded-md bg-blue-600 px-3 py-1.5 text-sm font-medium text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50"
          [disabled]="!newColumnName().trim() || saving()"
          (click)="addColumn()"
        >
          + Ajouter
        </button>
      </div>
    </div>
  }
</div>
