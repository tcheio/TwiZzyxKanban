<div class="overlay" (click)="cancel.emit()">
  <form class="dialog" [formGroup]="form" (click)="$event.stopPropagation()" (ngSubmit)="submit()">
    <h2>Nouveau ticket</h2>

    <label>
      Titre
      <input type="text" formControlName="title" autofocus />
    </label>

    <label>
      Chaîne YTB
      <input type="text" formControlName="channel" />
    </label>

    <label>
      Colonne
      <select formControlName="column_id">
        <option [ngValue]="null" disabled>— Choisir une colonne —</option>
        @for (column of columns; track column.id) {
          <option [ngValue]="column.id">{{ column.name }}</option>
        }
      </select>
    </label>

    <label>
      Tag
      <select formControlName="tag_id">
        <option [ngValue]="null">— Aucun tag —</option>
        @for (tag of tags; track tag.id) {
          <option [ngValue]="tag.id">{{ tag.name }}</option>
        }
      </select>
    </label>

    <label>
      Assigné à
      <select formControlName="assigned_user_id">
        <option [ngValue]="null">— Non assigné —</option>
        @for (user of users; track user.id) {
          <option [ngValue]="user.id">{{ user.username }}</option>
        }
      </select>
    </label>

    <label>
      Priorité
      <select formControlName="priority">
        <option value="low">Basse</option>
        <option value="medium">Moyenne</option>
        <option value="high">Haute</option>
      </select>
    </label>

    <div class="dialog-actions">
      <button type="button" (click)="cancel.emit()">Annuler</button>
      <button type="submit" [disabled]="form.invalid">Créer</button>
    </div>
  </form>
</div>
