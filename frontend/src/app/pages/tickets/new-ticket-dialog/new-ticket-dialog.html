<div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/40" (click)="cancelled.emit()">
  <form
    class="flex w-[360px] flex-col gap-3 rounded-lg bg-white p-6"
    [formGroup]="form"
    (click)="$event.stopPropagation()"
    (ngSubmit)="submit()"
  >
    <h2 class="m-0 mb-1 text-lg font-semibold text-gray-900">{{ heading }}</h2>

    <label for="new-ticket-title" class="flex flex-col gap-1 text-sm text-gray-700">
      Titre
      <input
        id="new-ticket-title"
        type="text"
        formControlName="title"
        autofocus
        class="rounded-md border border-gray-300 px-2.5 py-2 text-sm text-gray-900 focus:border-blue-400 focus:outline-none"
      />
    </label>

    <label for="new-ticket-description" class="flex flex-col gap-1 text-sm text-gray-700">
      Description
      <textarea
        id="new-ticket-description"
        formControlName="description"
        rows="3"
        class="rounded-md border border-gray-300 px-2.5 py-2 text-sm text-gray-900 focus:border-blue-400 focus:outline-none"
      ></textarea>
    </label>

    <label for="new-ticket-column" class="flex flex-col gap-1 text-sm text-gray-700">
      Colonne
      <select
        id="new-ticket-column"
        formControlName="column_id"
        class="rounded-md border border-gray-300 px-2.5 py-2 text-sm text-gray-900 focus:border-blue-400 focus:outline-none"
      >
        <option [ngValue]="null" disabled>— Choisir une colonne —</option>
        @for (column of columns; track column.id) {
          <option [ngValue]="column.id">{{ column.name }}</option>
        }
      </select>
    </label>

    <label for="new-ticket-tag" class="flex flex-col gap-1 text-sm text-gray-700">
      Tag
      <select
        id="new-ticket-tag"
        formControlName="tag_id"
        class="rounded-md border border-gray-300 px-2.5 py-2 text-sm text-gray-900 focus:border-blue-400 focus:outline-none"
      >
        <option [ngValue]="null">— Aucun tag —</option>
        @for (tag of tags; track tag.id) {
          <option [ngValue]="tag.id">{{ tag.name }}</option>
        }
      </select>
    </label>

    <label for="new-ticket-epic" class="flex flex-col gap-1 text-sm text-gray-700">
      EPIC
      <select
        id="new-ticket-epic"
        formControlName="epic_id"
        class="rounded-md border border-gray-300 px-2.5 py-2 text-sm text-gray-900 focus:border-blue-400 focus:outline-none"
      >
        <option [ngValue]="null">— Aucune EPIC —</option>
        @for (epic of epics; track epic.id) {
          <option [ngValue]="epic.id">{{ epic.name }}</option>
        }
      </select>
    </label>

    <label for="new-ticket-assignee" class="flex flex-col gap-1 text-sm text-gray-700">
      Assigné à
      <select
        id="new-ticket-assignee"
        formControlName="assigned_user_id"
        class="rounded-md border border-gray-300 px-2.5 py-2 text-sm text-gray-900 focus:border-blue-400 focus:outline-none"
      >
        <option [ngValue]="null">— Non assigné —</option>
        @for (user of users; track user.id) {
          <option [ngValue]="user.id">{{ user.username }}</option>
        }
      </select>
    </label>

    <label for="new-ticket-priority" class="flex flex-col gap-1 text-sm text-gray-700">
      Priorité
      <select
        id="new-ticket-priority"
        formControlName="priority"
        class="rounded-md border border-gray-300 px-2.5 py-2 text-sm text-gray-900 focus:border-blue-400 focus:outline-none"
      >
        <option value="low">Basse</option>
        <option value="medium">Moyenne</option>
        <option value="high">Haute</option>
      </select>
    </label>

    <label for="new-ticket-due-date" class="flex flex-col gap-1 text-sm text-gray-700">
      Date d'échéance
      <input
        id="new-ticket-due-date"
        type="date"
        formControlName="due_date"
        class="rounded-md border border-gray-300 px-2.5 py-2 text-sm text-gray-900 focus:border-blue-400 focus:outline-none"
      />
    </label>

    <div class="mt-2 flex justify-end gap-2">
      <button
        type="button"
        class="rounded-md border border-gray-300 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50"
        (click)="cancelled.emit()"
      >
        Annuler
      </button>
      <button
        type="submit"
        [disabled]="form.invalid"
        class="rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50"
      >
        {{ submitLabel }}
      </button>
    </div>
  </form>
</div>
