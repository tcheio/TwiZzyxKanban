@if (authService.isLoggedIn()) {
  <nav class="navbar">
    <span class="brand">TwiZzyxKanban</span>
    <a routerLink="/board" routerLinkActive="active">Tableau</a>
    <a routerLink="/tickets" routerLinkActive="active">Tickets</a>
    <a routerLink="/tags" routerLinkActive="active">Tags</a>
    @if (authService.isAdmin()) {
      <a routerLink="/admin/users" routerLinkActive="active">Utilisateurs</a>
    }
    <span class="spacer"></span>
    <span class="username">{{ authService.currentUser()?.username }}</span>
    <button class="logout" (click)="logout()">Déconnexion</button>
  </nav>
}

<router-outlet />
