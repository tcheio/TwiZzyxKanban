name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-test:
    name: Backend - Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm test
        working-directory: backend

  backend-smoke:
    name: Backend - Démarrage réel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - name: Démarre le serveur et vérifie /api/health
        working-directory: backend
        env:
          PORT: 3000
          JWT_SECRET: ci-smoke-test-secret
          DB_PATH: ./data/ci-smoke.db
        run: |
          node src/server.js &
          SERVER_PID=$!
          ok=0
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              ok=1
              break
            fi
            sleep 0.5
          done
          kill "$SERVER_PID" 2>/dev/null || true
          if [ "$ok" -ne 1 ]; then
            echo "Le serveur n'a pas démarré à temps"
            exit 1
          fi
          echo "Serveur démarré avec succès"

  frontend-test:
    name: Frontend - Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [backend-test, backend-smoke, frontend-test, frontend-build]
    if: always()
    steps:
      - name: Vérifie que tous les jobs ont réussi
        run: |
          if echo '${{ toJson(needs.*.result) }}' | grep -qE 'failure|cancelled'; then
            echo "Un ou plusieurs jobs ont échoué"
            exit 1
          fi
          echo "Tous les jobs ont réussi"
